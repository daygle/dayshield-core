name: Build and Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Checkout all repos
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Checkout dayshield-ui
        uses: actions/checkout@v4
        with:
          repository: daygle/dayshield-ui
          path: dayshield-ui
          ref: main

      - name: Checkout dayshield-rootfs
        uses: actions/checkout@v4
        with:
          repository: daygle/dayshield-rootfs
          path: dayshield-rootfs
          ref: main

      # Build core binary
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build core binary
        run: |
          cargo build --release -p dayshield-core
          mkdir -p release-artifacts
          cp target/release/dayshield-core release-artifacts/

      - name: Package core artifact
        run: |
          cd release-artifacts
          tar --zstd -cf core-${{ steps.version.outputs.VERSION }}.tar.zst dayshield-core
          ls -lh core-*.tar.zst

      # Build UI dist
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build UI
        run: |
          cd dayshield-ui
          npm ci --no-audit --no-fund
          npm run build

      - name: Package UI artifact
        run: |
          mkdir -p release-artifacts
          tar --zstd -cf release-artifacts/ui-${{ steps.version.outputs.VERSION }}.tar.zst -C dayshield-ui dist/
          ls -lh release-artifacts/ui-*.tar.zst

      # Build rootfs bundle
      - name: Setup rootfs build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y mmdebstrap

      - name: Build rootfs bundle
        run: |
          cd dayshield-rootfs
          # Build rootfs with live-update support
          ./scripts/build-rootfs.sh --output ../release-artifacts/rootfs-build
          cd ..
          tar --zstd -cf release-artifacts/rootfs-${{ steps.version.outputs.VERSION }}.tar.zst -C release-artifacts rootfs-build/
          ls -lh release-artifacts/rootfs-*.tar.zst

      # Generate checksums
      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum *.tar.zst > checksums.txt
          cat checksums.txt

      # Create GitHub Release with artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          files: |
            release-artifacts/core-*.tar.zst
            release-artifacts/ui-*.tar.zst
            release-artifacts/rootfs-*.tar.zst
            release-artifacts/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build and Release Core Artifact

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          RELEASE_VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"
          echo "Release version: ${RELEASE_VERSION}"

      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Build core binary
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: |
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Sync core crate version from tag
        run: |
          set -euo pipefail
          CORE_TOML="dayshield-core/Cargo.toml"
          sed -i -E "s/^version = \"[^\"]+\"/version = \"${{ steps.version.outputs.RELEASE_VERSION }}\"/" "$CORE_TOML"
          grep -E '^version = ' "$CORE_TOML"

      - name: Build core binary
        run: |
          cargo build --release -p dayshield-core --target x86_64-unknown-linux-musl
          mkdir -p release-artifacts
          cp target/x86_64-unknown-linux-musl/release/dayshield-core release-artifacts/

      - name: Package core artifact
        run: |
          cd release-artifacts
          tar --zstd -cf core-${{ steps.version.outputs.VERSION }}.tar.zst dayshield-core
          ls -lh core-*.tar.zst

      # Generate checksums
      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum core-*.tar.zst > checksums.txt
          cat checksums.txt

      # Create GitHub Release with artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          files: |
            release-artifacts/core-*.tar.zst
            release-artifacts/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Optional manifest update trigger
        env:
          MANIFEST_REPO_TOKEN: ${{ secrets.MANIFEST_REPO_TOKEN }}
          MANIFEST_REPO: daygle/dayshield-updates
        run: |
          set -euo pipefail
          if [ -z "${MANIFEST_REPO_TOKEN:-}" ]; then
            echo "MANIFEST_REPO_TOKEN is not set; skipping manifest dispatch."
            echo "Update central manifest manually or add MANIFEST_REPO_TOKEN with access to ${MANIFEST_REPO}."
            exit 0
          fi

          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${MANIFEST_REPO_TOKEN}" \
            "https://api.github.com/repos/${MANIFEST_REPO}/dispatches" \
            -d @- <<EOF
          {
            "event_type": "component-release-published",
            "client_payload": {
              "component": "core",
              "repo": "${{ github.repository }}",
              "tag": "${{ steps.version.outputs.VERSION }}"
            }
          }
          EOF
